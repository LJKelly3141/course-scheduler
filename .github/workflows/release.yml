name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          python -m venv backend\venv
          backend\venv\Scripts\pip install ".\backend[dev]"

      - name: Install Node dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build backend
        working-directory: backend
        run: venv\Scripts\pyinstaller.exe course_scheduler.spec --noconfirm
        shell: cmd

      - name: Build Electron (Windows)
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist-electron/*.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          python -m venv backend/venv
          backend/venv/bin/pip install "./backend[dev]"

      - name: Install Node dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build backend
        working-directory: backend
        run: venv/bin/pyinstaller course_scheduler.spec --noconfirm

      - name: Build Electron (macOS)
        run: npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: dist-electron/*.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dist
          path: dist/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Installation

            **macOS:** Download the `.dmg` file, open it, and drag The Chair's Desk to Applications.

            **Windows Installer:** Download the `Setup` `.exe` and run it.

            **Windows Portable:** Download the `portable` `.exe` and run it directly — no installation needed.
          files: |
            dist/windows/*.exe
            dist/macos/*.dmg
