name: Build & Release (Windows)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m venv backend\venv
          backend\venv\Scripts\pip install ".\backend[dev]"

      - name: Install Node dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build backend
        working-directory: backend
        run: venv\Scripts\pyinstaller.exe course_scheduler.spec --noconfirm
        shell: cmd

      - name: Build Electron (Windows)
        run: npx electron-builder --win --publish never

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Installation

            **macOS:** Download the `.dmg` file, open it, and drag The Chair's Desk to Applications.

            **Windows Installer:** Download the `Setup` `.exe` and run it.

            **Windows Portable:** Download the `portable` `.exe` and run it directly — no installation needed.
          files: |
            dist-electron/*.exe
