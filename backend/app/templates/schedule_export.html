<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ term_name }} Schedule{% if department_name %} — {{ department_name }}{% endif %}</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; font-size: 14px; }

  .container { max-width: 1440px; margin: 0 auto; padding: 16px 24px; }

  /* Header */
  .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .date { font-size: 13px; color: #64748b; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab-group { display: flex; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; }
  .tab-btn { padding: 6px 12px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; background: #fff; color: #64748b; transition: all .15s; }
  .tab-btn:not(:last-child) { border-right: 1px solid #e2e8f0; }
  .tab-btn.active { background: #4338ca; color: #fff; }
  .tab-btn:hover:not(.active) { background: #f1f5f9; }
  select.filter { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 8px; font-size: 13px; background: #fff; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .legend-pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 9999px; padding: 3px 10px; font-size: 12px; font-weight: 500; color: #334155; }

  /* Grid container */
  .grid-wrap { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow-x: auto; }
  .schedule-grid {
    display: grid;
    grid-template-columns: 60px repeat(5, 1fr);
    min-width: 700px;
  }

  /* Header cells */
  .grid-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 8px; font-size: 12px; font-weight: 500; text-align: center; position: sticky; top: 0; z-index: 20; }
  .grid-header:first-child { text-align: left; }

  /* Hour labels */
  .hour-label { font-size: 11px; color: #94a3b8; text-align: right; padding-right: 8px; padding-top: 2px; border-top: 1px solid #e2e8f0; position: sticky; left: 0; background: #fff; z-index: 10; }

  /* Slot cells (background grid) */
  .slot-cell { border-bottom: 1px solid #f1f5f9; }
  .slot-cell.hour-top { border-top: 1px solid #e2e8f0; }

  /* Day column overlay (holds positioned cards) */
  .day-column { position: relative; }

  /* Meeting card */
  .meeting-card {
    position: absolute;
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 11px;
    line-height: 1.3;
    overflow: hidden;
    cursor: default;
    border-left-width: 3px;
    border-left-style: solid;
    transition: box-shadow .15s;
  }
  .meeting-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); z-index: 15 !important; }
  .meeting-card .course-code { font-weight: 600; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meeting-card .instructor { color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meeting-card .room-label { color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Tooltip */
  .tooltip {
    display: none;
    position: absolute;
    left: 0; top: 100%;
    margin-top: 4px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
    padding: 10px 12px;
    width: 220px;
    z-index: 100;
    font-size: 12px;
    color: #1e293b;
  }
  .meeting-card:hover .tooltip { display: block; }
  .tooltip p { margin: 2px 0; }
  .tooltip .title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .tooltip .sub { color: #64748b; }

  /* Online sections table */
  .online-wrap { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-top: 16px; }
  .online-wrap h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .online-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .online-table th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #e2e8f0; color: #64748b; font-weight: 500; }
  .online-table td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }
  .online-table .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 2px; }

  @media print {
    .controls, .legend { display: none !important; }
    body { background: #fff; }
    .grid-wrap { border: none; border-radius: 0; }
    .container { padding: 0; max-width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>{{ term_name }} Schedule{% if department_name %} &mdash; {{ department_name }}{% endif %}</h1>
    <span class="date">Generated {{ generation_date if generation_date is defined else "" }}</span>
  </div>

  <div class="controls">
    <div class="tab-group">
      <button class="tab-btn active" data-mode="room">By Room</button>
      <button class="tab-btn" data-mode="instructor">By Instructor</button>
      <button class="tab-btn" data-mode="level">By Level</button>
    </div>
    <select class="filter" id="filter-select">
      <option value="all">All</option>
    </select>
  </div>

  <div class="legend" id="legend"></div>

  <div class="grid-wrap">
    <div class="schedule-grid" id="grid"></div>
  </div>

  <div class="online-wrap" id="online-wrap" style="display:none">
    <h3>Online Asynchronous Sections</h3>
    <table class="online-table">
      <thead>
        <tr>
          <th style="width:24px"></th>
          <th>Course</th>
          <th>Section</th>
          <th>Title</th>
          <th>Level</th>
          <th>Instructor</th>
          <th>Credits</th>
          <th>Enrollment Cap</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="online-body"></tbody>
    </table>
  </div>
</div>

<script>
const DATA = {{ schedule_data }};

// --- Constants (matching frontend) ---
const GRID_START_HOUR = 8;
const GRID_END_HOUR = 21;
const SLOT_MINUTES = 15;
const SLOT_HEIGHT_PX = 20;
const TOTAL_SLOTS = (GRID_END_HOUR - GRID_START_HOUR) * (60 / SLOT_MINUTES);
const GRID_START_MINUTES = GRID_START_HOUR * 60;
const DAY_LABELS = ["M", "T", "W", "Th", "F"];
const DAY_FULL = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];

// --- Color palette (matching frontend utils.ts) ---
const ENTITY_COLORS = [
  "#2563EB","#DC2626","#059669","#9333EA","#EA580C","#0891B2","#DB2777",
  "#2D6A4F","#D97706","#4F46E5","#16A34A","#BE185D","#0D9488","#B45309",
  "#7C3AED","#64748B"
];

const LEVEL_COLORS = {
  100:"#2563EB",200:"#0891B2",300:"#059669",400:"#7C3AED",
  500:"#EA580C",600:"#DB2777",700:"#E11D48"
};

function buildColorMap(ids) {
  const m = new Map();
  ids.forEach((id, i) => m.set(id, ENTITY_COLORS[i % ENTITY_COLORS.length]));
  return m;
}

function getLevelHexColor(courseNum) {
  const level = Math.floor(parseInt(courseNum) / 100) * 100;
  return LEVEL_COLORS[level] || "#64748B";
}

function parseDays(json) {
  try { const d = JSON.parse(json); return Array.isArray(d) ? d : []; } catch { return []; }
}

function timeToMinutes(t) {
  const [h, m] = t.split(":"); return parseInt(h) * 60 + parseInt(m);
}

function formatTime(t) {
  const [h, m] = t.split(":");
  const hour = parseInt(h);
  const ampm = hour >= 12 ? "PM" : "AM";
  const h12 = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
  return h12 + ":" + m + " " + ampm;
}

function formatHourLabel(hour) {
  const ampm = hour >= 12 ? "PM" : "AM";
  const h12 = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
  return h12 + " " + ampm;
}

// --- Overlap algorithm (port of ScheduleGrid.tsx computeOverlapColumns) ---
function computeOverlapColumns(dayMeetings) {
  const sorted = [...dayMeetings].sort((a, b) => timeToMinutes(a.start_time) - timeToMinutes(b.start_time));
  const columns = [];
  const assignments = new Map();

  for (const m of sorted) {
    const start = timeToMinutes(m.start_time);
    let col = -1;
    for (let c = 0; c < columns.length; c++) {
      if (columns[c] <= start) { col = c; break; }
    }
    if (col === -1) { col = columns.length; columns.push(0); }
    columns[col] = timeToMinutes(m.end_time);
    assignments.set(m.id, { column: col, totalColumns: 0 });
  }

  for (const m of sorted) {
    const mStart = timeToMinutes(m.start_time);
    const mEnd = timeToMinutes(m.end_time);
    let maxCols = 1;
    for (const other of sorted) {
      if (other.id === m.id) continue;
      const oStart = timeToMinutes(other.start_time);
      const oEnd = timeToMinutes(other.end_time);
      if (oStart < mEnd && oEnd > mStart) {
        const info = assignments.get(other.id);
        maxCols = Math.max(maxCols, info.column + 1);
      }
    }
    const myInfo = assignments.get(m.id);
    maxCols = Math.max(maxCols, myInfo.column + 1);
    myInfo.totalColumns = maxCols;
  }

  for (const m of sorted) {
    const mStart = timeToMinutes(m.start_time);
    const mEnd = timeToMinutes(m.end_time);
    const myInfo = assignments.get(m.id);
    for (const other of sorted) {
      if (other.id === m.id) continue;
      const oStart = timeToMinutes(other.start_time);
      const oEnd = timeToMinutes(other.end_time);
      if (oStart < mEnd && oEnd > mStart) {
        const otherInfo = assignments.get(other.id);
        const maxTotal = Math.max(myInfo.totalColumns, otherInfo.totalColumns);
        myInfo.totalColumns = maxTotal;
        otherInfo.totalColumns = maxTotal;
      }
    }
  }

  return assignments;
}

// --- State ---
let viewMode = "room";
const roomColorMap = buildColorMap(DATA.rooms.map(r => r.id));
const instructorColorMap = buildColorMap(DATA.instructors.map(i => i.id));

function getColor(m) {
  if (viewMode === "room") return m.room_id ? (roomColorMap.get(m.room_id) || "#9ca3af") : "#9ca3af";
  if (viewMode === "instructor") return m.instructor_id ? (instructorColorMap.get(m.instructor_id) || "#9ca3af") : "#9ca3af";
  return getLevelHexColor(m.section?.course?.course_number || "");
}

function getFilterValue() { return document.getElementById("filter-select").value; }

function filterMeetings(meetings) {
  const fv = getFilterValue();
  let filtered = meetings;
  if (fv !== "all") {
    if (viewMode === "room") filtered = meetings.filter(m => String(m.room_id) === fv);
    else if (viewMode === "instructor") filtered = meetings.filter(m => String(m.instructor_id) === fv);
    else if (viewMode === "level") {
      filtered = meetings.filter(m => {
        const num = m.section?.course?.course_number;
        if (!num) return false;
        return String(Math.floor(parseInt(num) / 100) * 100) === fv;
      });
    }
  }
  return filtered.filter(m => m.start_time && m.days_of_week && m.days_of_week.length > 0);
}

function filterOnlineSections(sections) {
  const fv = getFilterValue();
  let filtered = sections;
  if (fv !== "all") {
    if (viewMode === "room") return [];
    if (viewMode === "instructor") filtered = sections.filter(s => String(s.instructor_id) === fv);
    if (viewMode === "level") {
      filtered = sections.filter(s => {
        const num = s.course?.course_number;
        if (!num) return false;
        return String(Math.floor(parseInt(num) / 100) * 100) === fv;
      });
    }
  }
  return filtered;
}

// --- Render functions ---
function renderGrid() {
  const grid = document.getElementById("grid");
  const meetings = filterMeetings(DATA.meetings);

  // Build grid-template-rows dynamically
  grid.style.gridTemplateRows = `auto repeat(${TOTAL_SLOTS}, ${SLOT_HEIGHT_PX}px)`;
  grid.innerHTML = "";

  // Header row
  const timeHeader = el("div", "grid-header", "Time");
  timeHeader.style.gridColumn = "1"; timeHeader.style.gridRow = "1"; timeHeader.style.textAlign = "left";
  grid.appendChild(timeHeader);
  DAY_FULL.forEach((day, i) => {
    const h = el("div", "grid-header", day);
    h.style.gridColumn = String(i + 2); h.style.gridRow = "1";
    grid.appendChild(h);
  });

  // Hour labels
  for (let hour = GRID_START_HOUR; hour < GRID_END_HOUR; hour++) {
    const slotIndex = (hour - GRID_START_HOUR) * 4;
    const lbl = el("div", "hour-label", formatHourLabel(hour));
    lbl.style.gridColumn = "1";
    lbl.style.gridRow = `${slotIndex + 2} / span 4`;
    lbl.style.display = "flex";
    lbl.style.alignItems = "flex-start";
    lbl.style.justifyContent = "flex-end";
    grid.appendChild(lbl);
  }

  // Background slot cells
  for (let s = 0; s < TOTAL_SLOTS; s++) {
    for (let d = 0; d < 5; d++) {
      const cell = el("div", "slot-cell");
      if (s % 4 === 0) cell.classList.add("hour-top");
      cell.style.gridColumn = String(d + 2);
      cell.style.gridRow = String(s + 2);
      grid.appendChild(cell);
    }
  }

  // Day column overlays with meeting cards
  DAY_LABELS.forEach((day, dayIdx) => {
    const dayMeetings = meetings.filter(m => parseDays(m.days_of_week).includes(day));
    const overlapMap = computeOverlapColumns(dayMeetings);

    const col = el("div", "day-column");
    col.style.gridColumn = String(dayIdx + 2);
    col.style.gridRow = `2 / span ${TOTAL_SLOTS}`;

    dayMeetings.forEach(m => {
      const startMin = timeToMinutes(m.start_time);
      const endMin = timeToMinutes(m.end_time);
      const topPx = ((startMin - GRID_START_MINUTES) / SLOT_MINUTES) * SLOT_HEIGHT_PX;
      const heightPx = ((endMin - startMin) / SLOT_MINUTES) * SLOT_HEIGHT_PX;
      const overlap = overlapMap.get(m.id) || { column: 0, totalColumns: 1 };
      const widthPct = 100 / overlap.totalColumns;
      const leftPct = overlap.column * widthPct;

      const color = getColor(m);
      const card = el("div", "meeting-card");
      card.style.top = topPx + "px";
      card.style.height = heightPx + "px";
      card.style.left = leftPct + "%";
      card.style.width = widthPct + "%";
      card.style.backgroundColor = color + "14";
      card.style.borderLeftColor = color;

      const course = m.section?.course;
      const deptCode = course?.department_code || "";
      const courseNum = course?.course_number || "";
      const secNum = m.section?.section_number || "";
      const instrName = m.instructor?.name || "TBD";
      const lastName = instrName.split(" ").pop();
      const roomLabel = m.room ? `${m.room.building?.abbreviation || ""} ${m.room.room_number}` : "Online";
      const durationMin = endMin - startMin;

      card.innerHTML = `<div class="course-code">${deptCode} ${courseNum}-${secNum}</div>` +
        `<div class="instructor">${lastName}</div>` +
        (durationMin > 50 ? `<div class="room-label">${roomLabel}</div>` : "") +
        `<div class="tooltip">` +
          `<p class="title">${deptCode} ${courseNum}-${secNum}</p>` +
          `<p class="sub">${course?.title || ""}</p>` +
          `<p>Instructor: ${instrName}</p>` +
          `<p>Room: ${roomLabel}</p>` +
          `<p>Time: ${formatTime(m.start_time)} – ${formatTime(m.end_time)}</p>` +
          `<p>Days: ${parseDays(m.days_of_week).join(", ")}</p>` +
          `<p>Credits: ${course?.credits || "—"}</p>` +
          `<p>Enrollment Cap: ${m.section?.enrollment_cap || "—"}</p>` +
        `</div>`;

      col.appendChild(card);
    });

    grid.appendChild(col);
  });
}

function renderLegend() {
  const legend = document.getElementById("legend");
  legend.innerHTML = "";

  if (viewMode === "room") {
    DATA.rooms.forEach(r => {
      const c = roomColorMap.get(r.id) || "#9ca3af";
      const label = (r.building?.abbreviation || "") + " " + r.room_number;
      legend.appendChild(pill(label, c));
    });
  } else if (viewMode === "instructor") {
    DATA.instructors.forEach(i => {
      const c = instructorColorMap.get(i.id) || "#9ca3af";
      legend.appendChild(pill(i.name, c));
    });
  } else {
    ["100","200","300","400","600","700"].forEach(l => {
      const c = getLevelHexColor(l);
      legend.appendChild(pill(l + "-level", c));
    });
  }
}

function renderFilter() {
  const sel = document.getElementById("filter-select");
  const val = sel.value;
  sel.innerHTML = '<option value="all">All</option>';

  if (viewMode === "room") {
    DATA.rooms.forEach(r => {
      const opt = document.createElement("option");
      opt.value = String(r.id);
      opt.textContent = (r.building?.abbreviation || "") + " " + r.room_number + " (cap: " + r.capacity + ")";
      sel.appendChild(opt);
    });
  } else if (viewMode === "instructor") {
    DATA.instructors.forEach(i => {
      const opt = document.createElement("option");
      opt.value = String(i.id);
      opt.textContent = i.name;
      sel.appendChild(opt);
    });
  } else {
    ["100","200","300","400","600","700"].forEach(l => {
      const opt = document.createElement("option");
      opt.value = l;
      opt.textContent = l + "-level";
      sel.appendChild(opt);
    });
  }

  // Restore selection if still valid
  if (sel.querySelector(`option[value="${val}"]`)) sel.value = val;
  else sel.value = "all";
}

function renderOnline() {
  const sections = filterOnlineSections(DATA.online_sections);
  const wrap = document.getElementById("online-wrap");
  const body = document.getElementById("online-body");
  body.innerHTML = "";

  if (sections.length === 0) { wrap.style.display = "none"; return; }
  wrap.style.display = "";

  sections.forEach(s => {
    const course = s.course;
    const courseNum = course?.course_number || "";
    const level = Math.floor(parseInt(courseNum) / 100) * 100;
    let rowColor = "#9ca3af";
    if (viewMode === "instructor" && s.instructor_id) rowColor = instructorColorMap.get(s.instructor_id) || "#9ca3af";
    else if (viewMode === "level") rowColor = getLevelHexColor(courseNum);
    else rowColor = getLevelHexColor(courseNum);

    const tr = document.createElement("tr");
    tr.innerHTML =
      `<td><span class="color-dot" style="background:${rowColor}20;border-left:2px solid ${rowColor}"></span></td>` +
      `<td style="font-weight:500">${course?.department_code || ""} ${courseNum}</td>` +
      `<td>${s.section_number}</td>` +
      `<td>${course?.title || ""}</td>` +
      `<td>${level || "—"}-level</td>` +
      `<td>${s.instructor?.name || "TBD"}</td>` +
      `<td>${course?.credits || ""}</td>` +
      `<td>${s.enrollment_cap || "—"}</td>` +
      `<td style="text-transform:capitalize">${s.status}</td>`;
    body.appendChild(tr);
  });
}

function renderAll() {
  renderFilter();
  renderLegend();
  renderGrid();
  renderOnline();
}

// --- Helpers ---
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}

function pill(label, color) {
  const span = el("span", "legend-pill", label);
  span.style.backgroundColor = color + "14";
  span.style.borderLeft = "3px solid " + color;
  return span;
}

// --- Event listeners ---
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    viewMode = btn.dataset.mode;
    renderAll();
  });
});

document.getElementById("filter-select").addEventListener("change", () => {
  renderGrid();
  renderOnline();
});

// --- Initial render ---
renderAll();
</script>
</body>
</html>
